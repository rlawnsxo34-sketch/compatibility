<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>숲속 부캐 궁합 카드 발급소</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary-green: #385E3C;
            --accent-orange: #E58D67;
            --bg-light: #F5F9F4;
            --border-color: #EAF2EC;
            --danger-red: #D9534F;
        }

        body {
            background-color: var(--bg-light);
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            padding: 0;
            color: #2C3E2D;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* 헤더 & 로고 */
        .header {
            text-align: center;
            padding: 20px;
            background-color: white;
        }
        .header img {
            max-height: 40px;
            margin-bottom: 10px;
        }
        .header h1 {
            font-family: 'Jua', sans-serif;
            font-size: 28px;
            color: var(--primary-green);
            margin: 0;
        }

        /* 입력 폼 영역 */
        .selection-area {
            padding: 20px;
            background-color: var(--primary-green);
            color: white;
            border-radius: 0 0 30px 30px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            font-family: 'Jua', sans-serif;
            font-size: 18px;
            margin-bottom: 8px;
            color: #DDE8DF;
        }
        select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-family: 'Noto Sans KR', sans-serif;
            font-weight: 700;
        }

        .vs-text {
            text-align: center;
            font-family: 'Jua', sans-serif;
            font-size: 24px;
            margin: 10px 0;
            color: var(--accent-orange);
        }

        /* 카드 결과 영역 */
        .result-area {
            padding: 20px;
            flex-grow: 1;
            display: none;
        }

        /* 캡처될 카드 스타일 */
        #capture-card {
            background-color: white;
            border: 3px solid var(--primary-green);
            border-radius: 20px;
            padding: 25px;
            position: relative;
            background-image: url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='2' cy='2' r='1' fill='%23f1f1f1'/%3E%3C/svg%3E");
        }

        .card-header {
            text-align: center;
            border-bottom: 1px dashed #ccc;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .card-header h2 {
            font-family: 'Jua', sans-serif;
            margin: 0;
            color: var(--primary-green);
            font-size: 22px;
        }

        .matching-visual {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .char-box {
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .char-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: var(--bg-light);
            margin: 0 auto 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--primary-green);
            overflow: hidden;
        }
        .char-circle img {
            width: 75%;
            height: 75%;
            object-fit: contain;
        }
        
        /* 💡 수정된 부분: 이름 글자 수 길어질 때 예쁘게 처리 */
        .char-name {
            font-family: 'Jua', sans-serif;
            font-size: 15px; /* 폰트 크기 미세 조정 */
            line-height: 1.2;
            word-break: keep-all; /* 단어 중간에 끊기지 않도록 설정 */
            min-height: 36px; /* 1줄/2줄 높이를 맞춰서 카드 균형 유지 */
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2px;
            padding: 0 5px;
        }

        .char-type {
            font-size: 12px;
            color: #666;
            font-weight: bold;
        }

        .score-badge {
            background-color: var(--accent-orange);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-family: 'Jua', sans-serif;
            font-size: 18px;
            margin: 0 5px;
            white-space: nowrap;
        }
        
        .score-badge.bad {
            background-color: var(--danger-red);
        }

        .chemistry-info {
            background-color: #FDFBF7;
            padding: 15px;
            border-radius: 12px;
            border-left: 5px solid var(--accent-orange);
        }
        .chemistry-info.bad {
            border-left-color: var(--danger-red);
        }

        .chem-tag {
            display: inline-block;
            background-color: #EEE;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .chem-msg {
            font-size: 15px;
            line-height: 1.6;
            color: #444;
            word-break: keep-all;
        }

        .card-footer {
            margin-top: 20px;
            text-align: center;
        }

        /* 버튼들 */
        .btn-group {
            margin-top: 20px;
        }
        .btn {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-family: 'Jua', sans-serif;
            font-size: 18px;
            cursor: pointer;
            margin-bottom: 10px;
            transition: 0.2s;
        }
        .btn-primary { background-color: var(--primary-green); color: white; }
        .btn-accent { background-color: var(--accent-orange); color: white; }

        #download-btn { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="50186.png" alt="국립장성숲체원 로고" onerror="this.style.display='none'">
        <h1>숲속 부캐 궁합 카드</h1>
    </div>

    <div class="selection-area">
        <div class="input-group">
            <label>나의 부캐</label>
            <select id="myChar" onchange="resetView()">
                <option value="">캐릭터를 선택하세요</option>
            </select>
        </div>
        <div class="vs-text">X</div>
        <div class="input-group">
            <label>짝꿍의 부캐</label>
            <select id="yourChar" onchange="resetView()">
                <option value="">캐릭터를 선택하세요</option>
            </select>
        </div>
        <button class="btn btn-accent" onclick="showChemistry()">궁합 결과 확인하기</button>
    </div>

    <div class="result-area" id="resultArea">
        <div id="capture-card">
            <div class="card-header">
                <img src="50186.png" style="max-height:25px; margin-bottom:5px;" onerror="this.style.display='none'">
                <h2>🌲 우리의 숲속 궁합지수</h2>
            </div>

            <div class="matching-visual">
                <div class="char-box">
                    <div class="char-circle"><img id="myImg" src="" alt=""></div>
                    <div class="char-name" id="myName">이름</div>
                    <div class="char-type" id="myType">MBTI</div>
                </div>
                <div class="score-badge" id="chemScore">결과</div>
                <div class="char-box">
                    <div class="char-circle"><img id="yourImg" src="" alt=""></div>
                    <div class="char-name" id="yourName">이름</div>
                    <div class="char-type" id="yourType">MBTI</div>
                </div>
            </div>

            <div class="chemistry-info" id="chemInfoBox">
                <div class="chem-tag" id="chemTag">태그</div>
                <div class="chem-msg" id="chemMsg">궁합 메시지가 이곳에 표시됩니다.</div>
            </div>

            <div class="card-footer">
                <img src="핸드폰_포이,마리.png" alt="포이와 마리 캐릭터" style="height: 80px; object-fit: contain;" onerror="this.style.display='none'">
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" id="download-btn" onclick="downloadCard()">
                <i class="fa-solid fa-download"></i> 카드 이미지 저장하기
            </button>
        </div>
    </div>
</div>

<script>
    const characters = {
        "ISTJ": { name: "듬직한 편백나무", img: "istj_tree.png", group: "SJ" },
        "ISFJ": { name: "따뜻한 흙과 이끼", img: "isfj_moss.png", group: "SJ" },
        "ESTJ": { name: "보안관 딱따구리", img: "estj_woodpecker.png", group: "SJ" },
        "ESFJ": { name: "안내자 사슴", img: "esfj_deer.png", group: "SJ" },
        "ISTP": { name: "재주꾼 비버", img: "istp_beaver.png", group: "SP" },
        "ISFP": { name: "여유로운 산토끼", img: "isfp_rabbit.png", group: "SP" },
        "ESTP": { name: "에너자이저 산양", img: "estp_goat.png", group: "SP" },
        "ESFP": { name: "엔터테이너 수달", img: "esfp_otter.png", group: "SP" },
        "INFJ": { name: "신비로운 반딧불이", img: "infj_firefly.png", group: "NF" },
        "INFP": { name: "음유시인 종달새", img: "infp_bird.png", group: "NF" },
        "ENFJ": { name: "다정한 아빠 곰", img: "enfj_bear.png", group: "NF" },
        "ENFP": { name: "장난꾸러기 도깨비", img: "enfp_goblin.png", group: "NF" },
        "INTJ": { name: "은둔형 올빼미", img: "intj_owl.png", group: "NT" },
        "INTP": { name: "괴짜 독버섯", img: "intp_mushroom.png", group: "NT" },
        "ENTJ": { name: "위풍당당 호랑이", img: "entj_tiger.png", group: "NT" },
        "ENTP": { name: "개척자 청설모", img: "entp_squirrel.png", group: "NT" }
    };

    function initSelect() {
        const mySelect = document.getElementById('myChar');
        const yourSelect = document.getElementById('yourChar');
        for (const [mbti, info] of Object.entries(characters)) {
            const opt = `<option value="${mbti}">${info.name} (${mbti})</option>`;
            mySelect.innerHTML += opt;
            yourSelect.innerHTML += opt;
        }
    }

    function resetView() {
        document.getElementById('resultArea').style.display = 'none';
    }

    function showChemistry() {
        const myKey = document.getElementById('myChar').value;
        const yourKey = document.getElementById('yourChar').value;

        if (!myKey || !yourKey) {
            alert("두 캐릭터를 모두 선택해주세요!");
            return;
        }

        const my = characters[myKey];
        const your = characters[yourKey];

        document.getElementById('myImg').src = my.img;
        document.getElementById('myName').innerText = my.name;
        document.getElementById('myType').innerText = myKey;
        document.getElementById('yourImg').src = your.img;
        document.getElementById('yourName').innerText = your.name;
        document.getElementById('yourType').innerText = yourKey;

        const scoreBadge = document.getElementById('chemScore');
        const infoBox = document.getElementById('chemInfoBox');
        scoreBadge.classList.remove('bad');
        infoBox.classList.remove('bad');

        let scoreText = "";
        let tag = "";
        let msg = "";

        if (myKey === yourKey) {
            scoreText = "영혼의 단짝";
            tag = "#거울치료 #텔레파시";
            msg = `말하지 않아도 눈빛만으로 통하는 완벽한 복제형 동료네요!<br>서로의 장단점을 너무 잘 알아서 숲의 어떤 시련도 함께 웃으며 이겨낼 수 있는 무적의 조합입니다.`;
        } else if (
            (myKey === 'ENFP' && yourKey === 'INTJ') || (myKey === 'INTJ' && yourKey === 'ENFP') ||
            (myKey === 'ENTP' && yourKey === 'INFJ') || (myKey === 'INFJ' && yourKey === 'ENTP') ||
            (myKey === 'ESTP' && yourKey === 'ISFJ') || (myKey === 'ISFJ' && yourKey === 'ESTP')
        ) {
            scoreText = "환상의 짝꿍";
            tag = "#최강시너지 #상호보완";
            msg = `한 명은 기발한 상상을 하고, 한 명은 그것을 현실로 만드는 최고의 공생 관계!<br>서로의 부족한 점을 자석처럼 딱 채워주니, 함께라면 방장산 정상 정복도 식은 죽 먹기겠군요.`;
        } else if (my.group === your.group) {
            scoreText = "찰떡궁합";
            tag = "#안정적인숲길 #평화주의";
            msg = `비슷한 가치관과 속도를 가진 두 분이 만났네요!<br>숲을 탐험하는 방식이 닮아 있어 큰 갈등 없이 서로를 믿고 의지하며 걷는 아주 편안하고 따뜻한 파트너가 될 것입니다.`;
        } else if (
            (myKey === 'ENTJ' && yourKey === 'ISFP') || (myKey === 'ISFP' && yourKey === 'ENTJ') ||
            (myKey === 'ESTJ' && yourKey === 'INFP') || (myKey === 'INFP' && yourKey === 'ESTJ') ||
            (myKey === 'ISTJ' && yourKey === 'ENFP') || (myKey === 'ENFP' && yourKey === 'ISTJ')
        ) {
            scoreText = "환장의 짝꿍";
            tag = "#동상이몽 #이해필수";
            msg = `한 명은 직진하는데 한 명은 꽃향기를 맡는, 속도가 너무 다른 두 분이군요!<br>서로 '왜 저럴까?' 싶겠지만, 그 다름을 인정하는 순간 숲은 더 풍성해집니다. 조금만 천천히 기다려 주세요!`;
            scoreBadge.classList.add('bad');
            infoBox.classList.add('bad');
        } else {
            scoreText = "좋은 파트너";
            tag = "#새로운발견 #성장케미";
            msg = `서로의 다른 매력에 깜짝깜짝 놀라게 되는 신선한 조합입니다!<br>때로는 이해가 안 가기도 하겠지만, 서로에게 배우는 점이 많아 함께할수록 숲속 모험이 더 다채롭고 즐거워질 거예요.`;
        }

        document.getElementById('chemScore').innerText = scoreText;
        document.getElementById('chemTag').innerText = tag;
        document.getElementById('chemMsg').innerHTML = msg;

        document.getElementById('resultArea').style.display = 'block';
        document.getElementById('download-btn').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function downloadCard() {
        const card = document.getElementById('capture-card');
        const btn = document.getElementById('download-btn');
        btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> 저장 중...";
        
        html2canvas(card, {
            scale: 2,
            backgroundColor: "#ffffff",
            useCORS: true
        }).then(canvas => {
            const image = canvas.toDataURL("image/png");
            const link = document.createElement('a');
            link.href = image;
            link.download = `숲속_궁합_카드_${Date.now()}.png`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            btn.innerHTML = "<i class='fa-solid fa-check'></i> 저장 완료!";
            setTimeout(() => {
                btn.innerHTML = "<i class='fa-solid fa-download'></i> 카드 이미지 저장하기";
            }, 2000);
        });
    }

    initSelect();
</script>

</body>
</html>
